name: PR template check

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate PR body
    runs-on: ubuntu-latest
    steps:
      - name: Check required template sections
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          node <<'NODE'
          const body = process.env.PR_BODY ?? "";

          const requiredText = [
            "# 🔀 Pull Request",
            "## 🧾 Summary",
            "## 🧱 Package Impact",
            "## 🧪 Verification",
            "## 📸 Screenshots",
          ];

          const requiredChecks = [
            { label: "`npm run typecheck`", pattern: /^- \[[ xX]\] `npm run typecheck`$/m },
            { label: "`npm test`", pattern: /^- \[[ xX]\] `npm test`$/m },
            { label: "`npm run build`", pattern: /^- \[[ xX]\] `npm run build`$/m },
            { label: "`npm run build:storybook`", pattern: /^- \[[ xX]\] `npm run build:storybook`$/m },
          ];

          const missing = [
            ...requiredText.filter((entry) => !body.includes(entry)),
            ...requiredChecks.filter((entry) => !entry.pattern.test(body)).map((entry) => entry.label),
          ];

          if (missing.length > 0) {
            console.error("The PR body does not follow .github/PULL_REQUEST_TEMPLATE.md.");
            console.error("Missing required content:");
            for (const entry of missing) console.error(`- ${entry}`);
            process.exit(1);
          }

          const orderedSections = [
            "# 🔀 Pull Request",
            "## 🧾 Summary",
            "## 🧱 Package Impact",
            "## 🧪 Verification",
            "## 📸 Screenshots",
          ];

          const outOfOrder = orderedSections.some((section, index) => {
            if (index === 0) return false;
            return body.indexOf(section) < body.indexOf(orderedSections[index - 1]);
          });

          if (outOfOrder) {
            console.error("The PR body template sections are not in the expected order.");
            process.exit(1);
          }
          NODE
