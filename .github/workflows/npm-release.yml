name: NPM Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, such as v2.23.1"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: node scripts/verify-release-tag.mjs ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm test

      - name: Build package
        run: npm run build

      - name: Build Storybook
        run: npm run build:storybook

      - name: Dry-run npm package
        run: npm run pack:dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
