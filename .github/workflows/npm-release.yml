name: NPM Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, such as v2.23.1"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: node scripts/verify-release-tag.mjs ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm test

      - name: Build package
        run: npm run build

      - name: Build Storybook
        run: npm run build:storybook

      - name: Dry-run npm package
        run: npm run pack:dry-run

      - name: Build release tarball
        run: npm run pack:release

      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tarball="release-artifacts/arcade-engine-${version}.tgz"

          if [ ! -f "$tarball" ]; then
            echo "Release tarball not found: $tarball" >&2
            exit 1
          fi

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "Release $RELEASE_TAG" \
              --notes "Release $RELEASE_TAG"
          fi

          gh release upload "$RELEASE_TAG" "$tarball" --clobber

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
