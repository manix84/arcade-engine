name: NPM Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, such as v2.23.1"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: npm-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Use npm with trusted publishing support
        run: |
          npm install --global npm@11
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            version="$(node -p "require('./package.json').version")"
            release_tag="v${version}"
          fi

          echo "RELEASE_TAG=${release_tag}" >> "$GITHUB_ENV"
          echo "Resolved release tag: ${release_tag}"

      - name: Verify release tag
        run: node scripts/verify-release-tag.mjs "$RELEASE_TAG"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm test

      - name: Build package
        run: npm run build

      - name: Build Storybook
        run: npm run build:storybook

      - name: Dry-run npm package
        run: npm run pack:dry-run

      - name: Build release tarball
        run: npm run pack:release -- --ignore-scripts

      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tarball="release-artifacts/arcade-engine-${version}.tgz"
          asset_name="$(basename "$tarball")"

          if [ ! -f "$tarball" ]; then
            echo "Release tarball not found: $tarball" >&2
            exit 1
          fi

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              "$tarball" \
              --draft \
              --target "$GITHUB_SHA" \
              --title "Release $RELEASE_TAG" \
              --notes "Release $RELEASE_TAG"
            gh release edit "$RELEASE_TAG" --draft=false
          elif gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | grep -Fx "$asset_name" >/dev/null; then
            echo "Release asset already exists: $asset_name"
          elif [ "$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')" = "true" ]; then
            gh release upload "$RELEASE_TAG" "$tarball" --clobber
            gh release edit "$RELEASE_TAG" --draft=false
          else
            echo "::warning::Release $RELEASE_TAG already exists without $asset_name and may be immutable."
            echo "::warning::Skipping the GitHub Release asset upload so package publishing can continue."
            echo "::warning::Delete the incomplete GitHub Release later if the tarball asset is required."
          fi

      - name: Publish to npm
        run: npm publish --access public

      - name: Prepare GitHub Packages package
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tarball="release-artifacts/arcade-engine-${version}.tgz"

          if [ ! -f "$tarball" ]; then
            echo "Release tarball not found: $tarball" >&2
            exit 1
          fi

          rm -rf github-package
          mkdir -p github-package
          tar -xzf "$tarball" -C github-package

          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const packagePath = "github-package/package/package.json";
          const packageJson = JSON.parse(readFileSync(packagePath, "utf8"));
          packageJson.name = "@manix84/arcade-engine";
          packageJson.publishConfig = {
            ...packageJson.publishConfig,
            registry: "https://npm.pkg.github.com"
          };
          writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      - name: Publish to GitHub Packages
        run: |
          set -euo pipefail
          echo "@manix84:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          test -f ./github-package/package/package.json
          npm publish ./github-package/package --registry=https://npm.pkg.github.com --access public
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
